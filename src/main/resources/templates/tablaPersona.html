<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<!--  CREDENCIAL PARA THYMELIFE-->
<head>
<meta charset="UTF-8">
<title>personal</title>
<link
	href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
	rel="stylesheet"
	integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
	crossorigin="anonymous">
</head>
<body>

	<h1  class="text-primary">Holas desde la tabla de personal 😎</h1>
	<table class="table table-dark table-hover">
		<tr>
			<td>Id</td>
			<td>Foto</td>
			<td>Nombre</td>
			<td>Apellidos</td>
			<td>DNI</td>
			<td>Sueldo</td>
			<td>Cargo</td>
			<td>Fecha/Nacimiento</td>
			<td>Fecha/Ingreso</td>
			<td>Estado civil</td>
			<td>Detalles</td>


		</tr>
		<tr th:each="personal : ${personal}">
			<td th:text="${personal.id}"></td>
			
			<td>
				<img th:src="@{/image/{img}(img=${personal.imagen})}" width="136" height="136" >
			</td>
			<td th:text="${personal.nombre}"></td>
			<td th:text="${personal.apellidos}"></td>
			<td th:text="${personal.dni}"></td>
			<td th:text="${personal.sueldo}"></td>
			<td th:text="${personal.tipoTrabajador}"></td>
			<td th:text="${personal.fNacimiento}"></td>
			<td th:text="${personal.fIngreso}"></td>
			
			
			<!--  
			<td th:text="${personal.estado}"></td>
			-->
			
			
			<td>
				<span th:if="${personal.estado == true }" class="badge bg-danger">Casado</span>
				<span th:unless="${personal.estado == true }" class="badge bg-success">Soltero</span>
			</td>
			
			<td>
				<a th:href="@{/persona/view/{id}(id=${personal.id})}" class="btn btn-success">Detalle</a>
			</td>
			

		</tr>
	</table>

	<script
		src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
		integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
		crossorigin="anonymous"></script>
</body>
</html>
