<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"> <!--  CREDENCIAL PARA THYMELIFE-->
<head>
<meta charset="UTF-8">
<title>Pagina</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>
<body>

<h1>Hola Bienvenidos a Detalle personal 😎</h1>

<h2>
	<img  th:src="@{/image/{img}(img=${personal.imagen})}" width="155" height="155">
</h2>
<h2 th:text="'Id :'+${personal.id}"></h2>
<h2 th:text="'Nombre :'+${personal.nombre}"></h2>
<h2 th:text="'Apellido :'+${personal.apellidos}"></h2>
<h2 th:text="'Dni :'+${personal.dni}"></h2>
<h2 th:text="'Fecha/Nacimiento :'+${personal.fNacimiento}"></h2>
<h2 th:text="'Fecha/Ingreso :'+${personal.fIngreso}"></h2>
<h2 th:text="'Fecha/cese :'+${personal.fCese}"></h2>
<h2 th:text="'Tipo/Trabajador :'+${personal.tipoTrabajador}"></h2>
<h2 th:text="'Sede :'+${personal.sede}"></h2>
<h2 th:text="'Estado :'+${personal.estado}"></h2>
<h2 th:text="'Sueldo :'+${personal.sueldo}"></h2>




<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</body>
</html>
